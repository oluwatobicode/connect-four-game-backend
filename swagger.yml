openapi: 3.0.0
info:
  title: Connect Four Multiplayer API
  description: A real-time, competitive Connect Four multiplayer engine featuring WebSockets, Minimax AI, automated Elo ranking, and an asynchronous achievement system.
  version: 1.0.0
  contact:
    name: Oluwatobi

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server
  - url: https://your-render-url.onrender.com/api/v1
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid credentials

    User:
      type: object
      properties:
        id:
          type: string
          example: clx123example
        email:
          type: string
          format: email
          example: player@example.com
        username:
          type: string
          example: connect_master
        avatar:
          type: string
          nullable: true
          example: https://example.com/avatar.png
        authProvider:
          type: string
          enum: [local, google]
          example: google
        googleId:
          type: string
          nullable: true
          example: "11223344556677889900"
        isVerified:
          type: boolean
          example: true

    SignUpRequest:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
          format: email
          example: player@example.com
        password:
          type: string
          format: password
          example: StrongPass123!
        username:
          type: string
          example: player_one

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: player@example.com
        password:
          type: string
          format: password
          example: StrongPass123!

    GoogleAuthRequest:
      type: object
      required: [googleToken]
      properties:
        googleToken:
          type: string
          description: Google ID token returned by the frontend Google sign-in flow.
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6Ij...

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: player@example.com

    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
          example: player@example.com
        otp:
          type: string
          example: "123456"

    ChangePasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: Password reset token generated from the reset link flow.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        newPassword:
          type: string
          format: password
          example: NewStrongPass123!

    TokenPairResponse:
      type: object
      properties:
        message:
          type: string
          example: Check your email for an OTP to verify your account
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    RefreshAccessTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Token refreshed successfully
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

security:
  - bearerAuth: []

paths:
  # ================= AUTHENTICATION ================= #
  /auth/signup:
    post:
      summary: Register a local account
      description: Creates a new email/password account, generates access and refresh tokens, and sends an OTP email for verification.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Account created and OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields or account uses Google sign-in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    post:
      summary: Login or create account with Google
      description: Verifies a Google ID token, then logs in the user or creates a new Google-backed account.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
      responses:
        '201':
          description: Successfully authenticated via Google
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout user
      description: Blacklists the provided refresh token so it can no longer be used.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refresh access token
      description: Validates a refresh token and returns a new access token if the refresh token is still valid and not blacklisted.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAccessTokenResponse'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid, revoked, or user-not-found refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/otp:
    post:
      summary: Send email verification OTP
      description: Sends a new OTP to a user's email if the account exists and is not already verified.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: OTP sent or email already verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/otp/verify:
    post:
      summary: Verify email with OTP
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing email or OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: User not found or OTP is invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/password/reset-link:
    post:
      summary: Send reset password link
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Reset link sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/password/change:
    post:
      summary: Change password with reset token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing token or new password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ================= PROFILE ================= #
  /profile:
    get:
      summary: Get Current User Profile
      tags: [Profile]
      responses:
        '200':
          description: Current user's profile and aggregated game stats

    put:
      summary: Update Profile
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                avatar:
                  type: string
      responses:
        '200':
          description: Profile updated successfully
        '409':
          description: Username already taken

    delete:
      summary: Soft Delete Profile
      tags: [Profile]
      responses:
        '200':
          description: User anonymized successfully

  /profile/{userId}:
    get:
      summary: Get Public Profile
      description: Fetches public stats of a specific user.
      tags: [Profile]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User public stats

  /profile/{userId}/game-history:
    get:
      summary: Get User's Game History
      tags: [Profile]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns the user's last 20 matches

  # ================= GAME ENGINE ================= #
  /game/create:
    post:
      summary: Create Game Room
      tags: [Game]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                gameMode:
                  type: string
                  enum: [PVP, PVC, ONLINE]
      responses:
        '201':
          description: Returns a 6-letter roomCode for multiplayer

  /game/join:
    post:
      summary: Join Game Room
      tags: [Game]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roomCode:
                  type: string
      responses:
        '200':
          description: Joined game successfully as Player 2

  /game/spectate:
    post:
      summary: Spectate Match
      tags: [Game]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roomCode:
                  type: string
      responses:
        '200':
          description: Returns the initial game state with a 'SPECTATOR' role flag

  /game/{id}:
    get:
      summary: Get Live Game State
      tags: [Game]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns the 6x7 2D array board state

  /game/{id}/move:
    post:
      summary: Submit Game Move
      tags: [Game]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                column:
                  type: integer
                  minimum: 0
                  maximum: 6
      responses:
        '200':
          description: Move validated. Backend broadcasts Socket.io event and restarts 30-second stall timer.
        '403':
          description: Not your turn
        '400':
          description: Column is completely full

  # ================= LEADERBOARD & ACHIEVEMENTS ================= #
  /leaderboard/all:
    get:
      summary: Global ELO Leaderboard
      tags: [Leaderboard]
      responses:
        '200':
          description: List of top players ranked by FIDE Elo score

  /achievements/me:
    get:
      summary: Get My Achievements
      tags: [Achievements]
      responses:
        '200':
          description: Returns list of unlocked badges (e.g., Speed Demon, First Blood)
