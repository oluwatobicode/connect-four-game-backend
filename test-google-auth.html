<!DOCTYPE html>
<html>
<head>
  <title>Google Auth Test</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <h2>Google Auth Test Page</h2>
  <div id="g_id_onload"
    data-client_id="1051774047252-8lhj69jjt5aqqmtav9hdt8vk3af92opu.apps.googleusercontent.com"
    data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <h3>Result:</h3>
  <pre id="result" style="background:#f4f4f4;padding:16px;white-space:pre-wrap;word-break:break-all;max-width:800px;"></pre>

  <script>
    async function handleCredentialResponse(response) {
      const idToken = response.credential;
      document.getElementById('result').textContent = 'Sending token to backend...\n\nToken:\n' + idToken;

      try {
        const res = await fetch('http://localhost:3000/api/v1/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ googleToken: idToken }),
        });
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
